<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Widget YT</title>
    <link rel="stylesheet" href="/overlay.css">
    <style>
      body { padding: 16px; }
      .music-shell {
        width: min(980px, 100%);
        margin: 0 auto;
      }
      .music-card {
        display: none;
        position: relative;
        overflow: hidden;
        padding: 20px;
        border-color: var(--overlay-border);
        font-family: var(--overlay-font);
        min-height: 250px;
      }
      .music-card.is-visible {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 20px;
        animation: music-in 340ms ease-out;
      }
      .music-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0.26;
        filter: blur(0px);
      }
      .music-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(0,0,0,0.62), rgba(0,0,0,0.24));
      }
      .music-cover {
        position: relative;
        width: 220px;
        height: 220px;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 24px 54px rgba(0,0,0,0.34);
      }
      .music-cover img { width: 100%; height: 100%; object-fit: cover; }
      .music-body,
      .music-cover {
        z-index: 1;
      }
      .music-title {
        margin: 4px 0 8px;
        font-size: clamp(1.7rem, 4vw, 3rem);
        font-weight: 900;
        color: var(--overlay-name-color);
        line-height: 1.05;
      }
      .music-subtitle {
        font-size: 0.92rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--overlay-title-color);
        font-weight: 800;
      }
      .music-meta {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: var(--overlay-message-color);
      }
      .music-chip {
        padding: 9px 14px;
        border-radius: 999px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.12);
        font-weight: 700;
      }
      .music-request {
        margin-top: 18px;
        color: var(--overlay-message-color);
        font-size: 1.06rem;
        line-height: 1.5;
        max-width: 58ch;
        word-break: break-word;
      }
      .music-badge {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 2;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--overlay-accent);
        color: #fff;
        font-size: 0.75rem;
        text-transform: uppercase;
        font-weight: 900;
        letter-spacing: 0.06em;
      }
      .player-frame {
        width: 100%;
        height: 180px;
        border: none;
        margin-top: 18px;
        border-radius: 18px;
        background: rgba(0,0,0,0.4);
      }
      .player-frame.audio-only {
        width: 1px;
        height: 1px;
        opacity: 0;
        position: absolute;
        pointer-events: none;
      }
      @keyframes music-in {
        from { opacity: 0; transform: translateY(16px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @media (max-width: 760px) {
        .music-card.is-visible { grid-template-columns: 1fr; }
        .music-cover { width: 180px; height: 180px; }
      }
    </style>
  </head>
  <body>
    <div class="overlay-root music-shell">
      <section class="overlay-card music-card style-glass" id="music-card">
        <div class="music-bg" id="music-bg"></div>
        <div class="music-overlay"></div>
        <div class="music-badge" id="music-badge">Widget YT</div>
        <div class="music-cover">
          <img id="music-cover-image" alt="">
        </div>
        <div class="music-body">
          <div class="music-subtitle" id="music-subtitle">YouTube Music</div>
          <div class="music-title" id="music-title">Music request</div>
          <div class="music-meta">
            <div class="music-chip" id="music-requester">Requester</div>
            <div class="music-chip" id="music-amount">0 ₸</div>
            <div class="music-chip" id="music-time">--:--</div>
          </div>
          <div class="music-request" id="music-request-text"></div>
          <iframe
            id="music-player-frame"
            class="player-frame audio-only"
            allow="autoplay; encrypted-media"
            allowfullscreen
          ></iframe>
        </div>
      </section>
    </div>

    <script src="/common.js"></script>
    <script src="/widgetyt.js"></script>
  </body>
</html>
